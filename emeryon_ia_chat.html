
<style>
  .ew { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0a1f; color: #e0d9ff; display: flex; justify-content: center; align-items: center; min-height: 600px; padding: 16px; border-radius: 12px; }
  #wrap { width: 100%; max-width: 480px; height: 580px; background: #1a1433; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); overflow: hidden; display: flex; flex-direction: column; }
  .header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid #3a2f66; background: #120d24; }
  .logo-av { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; border: 2px solid #7060dd; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #2a1f4d; font-size: 20px; }
  .header-info h1 { font-size: 17px; font-weight: 600; margin: 0; }
  .header-info p { font-size: 11px; color: #a39dff; margin: 2px 0 0; }
  .status { font-size: 12px; color: #1dd1a1; display: flex; align-items: center; gap: 5px; margin-top: 3px; }
  #chatBox { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #16102b; }
  .bubble { max-width: 80%; padding: 11px 15px; font-size: 14.5px; line-height: 1.55; border-radius: 18px; }
  .user-bubble { align-self: flex-end; background: #4c3dff; color: white; border-bottom-right-radius: 4px; }
  .ai-bubble { align-self: flex-start; background: #2a1f4d; color: #e0d9ff; border-bottom-left-radius: 4px; }
  .think-block { align-self: flex-start; max-width: 82%; padding: 10px 14px; background: #221b44; border-radius: 14px; font-size: 13px; color: #b8b0ff; border: 1px solid #3a2f66; }
  .think-label { font-size: 11px; color: #8a7dff; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
  .dot-anim span { display: inline-block; width: 5px; height: 5px; background: #7060dd; border-radius: 50%; animation: blink 1.4s infinite; }
  .dot-anim span:nth-child(2){animation-delay:.2s} .dot-anim span:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .input-area { padding: 14px 18px; background: #120d24; border-top: 1px solid #3a2f66; }
  .input-wrapper { display: flex; gap: 8px; align-items: center; }
  #msgInput { flex: 1; padding: 12px 16px; border: none; border-radius: 9999px; background: #2a1f4d; color: white; font-size: 14.5px; outline: none; }
  #msgInput:focus { outline: 2px solid #7060dd; }
  #sendBtn { padding: 10px 20px; background: #7060dd; color: white; border: none; border-radius: 9999px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; }
  #sendBtn:hover { background: #8a7dff; transform: translateY(-1px); }
  .demo-note { font-size: 11px; color: #a39dff; text-align: center; padding: 6px 0 0; opacity: 0.7; }
</style>

<div class="ew">
  <div id="wrap">
    <div class="header">
      <div class="logo-av">✦</div>
      <div class="header-info">
        <h1>Emeryon IA</h1>
        <p>Zekâ · Öğren · Geliş</p>
        <div class="status">● Çevrimiçi</div>
      </div>
    </div>
    <div id="chatBox"></div>
    <div class="input-area">
      <div class="input-wrapper">
        <input id="msgInput" type="text" placeholder="Mesajınızı yazın..." />
        <button id="sendBtn">Gönder</button>
      </div>
      <div class="demo-note">Demo mod — backend bağlantısı simüle ediliyor</div>
    </div>
  </div>
</div>

<script>
const chatBox = document.getElementById('chatBox');
const msgInput = document.getElementById('msgInput');

const demoReplies = [
  "Merhaba! Size nasıl yardımcı olabilirim?",
  "Harika bir soru! Bu konuda daha fazla bilgi verebilirim.",
  "Anladım, şimdi analiz ediyorum...",
  "Bu konuda birkaç önerin var: önce temel kavramları öğrenmek, sonra pratik yapmak faydalı olur.",
  "Evet, bu mümkün! Adım adım ilerleyelim mi?"
];
let replyIdx = 0;

function addBubble(text, cls) {
  const el = document.createElement('div');
  el.className = 'bubble ' + cls;
  el.textContent = text;
  chatBox.appendChild(el);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addThinking() {
  const think = document.createElement('div');
  think.className = 'think-block';
  think.innerHTML = '<div class="think-label"><span class="dot-anim"><span></span><span></span><span></span></span>Emeryon düşünüyor...</div>';
  chatBox.appendChild(think);
  chatBox.scrollTop = chatBox.scrollHeight;
  return think;
}

async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  addBubble(text, 'user-bubble');
  msgInput.value = '';
  const thinking = addThinking();
  await new Promise(r => setTimeout(r, 1200));
  thinking.remove();
  const reply = demoReplies[replyIdx % demoReplies.length];
  replyIdx++;
  addBubble(reply, 'ai-bubble');
}

msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
document.getElementById('sendBtn').addEventListener('click', sendMsg);

const welcome = document.createElement('div');
welcome.className = 'bubble ai-bubble';
welcome.textContent = 'Merhaba! Ben Emeryon IA 👋 Sana nasıl yardımcı olabilirim?';
chatBox.appendChild(welcome);
</script>
